# Load Balancer Configuration File
# Format: key=value (no spaces around =)

# Server Settings
initial_servers=10
scaling_cooldown=10
min_servers=1
max_servers=100

# Request Generation
min_requests_per_cycle=5
max_requests_per_cycle=15
min_processing_time=1
max_processing_time=10

# Scaling Thresholds
lower_threshold_multiplier=50
upper_threshold_multiplier=80

# Simulation Settings
default_simulation_cycles=10000
log_interval=1000

# Firewall Settings
enable_firewall=true
blocked_ip_ranges=192.168.1,10.0.0